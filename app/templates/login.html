<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.append.css') }}">
  <link rel="icon" href="{{ url_for('static', path='images/mbd_favicon.svg') }}">
</head>
</head>
<body class="auth-body">

<div class="macos-window auth-window">

  <!-- macOS Titlebar -->
  <div class="macos-titlebar">
    <div class="traffic-lights">
      <button class="tl tl-close" disabled  onclick="history.back()"></button>
      <button class="tl tl-min"  disabled   onclick="void(0)"></button>
      <button class="tl tl-max"  disabled   onclick="void(0)"></button>
    </div>
    <span class="macos-title">로그인</span>
  </div>

  <!-- Auth Shell -->
  <div class="auth-shell">

    <!-- Left panel: branding -->
    <div class="auth-left">
      <div class="auth-brand">
        <span class="site-logo">
          <span class="logo-bracket">[</span>Oops<span class="logo-accent">First</span><span class="logo-bracket">]</span>
        </span>
        <p class="auth-brand-desc">실수는 가능한 빠르게,<br>복구는 더욱더 빠르게</p>
      </div>
      <div class="auth-left-deco">
        <div class="deco-grid"></div>
        <div class="deco-glow"></div>
        <div class="deco-lines">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h2 class="auth-title">다시 돌아오셨군요</h2>
        <p class="auth-subtitle">계정에 로그인하세요</p>

        <!-- Flash message (Jinja2: {{ message }}) -->
        {% if message %}
        <div class="flash flash-{{ message_type | default('error') }}">{{ message }}</div>
        {% endif %}

        <form class="auth-form" id="login-form" method="POST" action="/login">
          <!-- CSRF (FastAPI with starlette sessions) -->
          <!-- <input type="hidden" name="csrf_token" value="{{ csrf_token }}"> -->

          <div class="form-group" id="fg-id">
            <label class="form-label" for="username">아이디</label>
            <div class="input-wrap">
              <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              <input class="form-input" id="username" name="username" type="text"
                     placeholder="아이디 입력"
                     value="{{ form.username | default('') }}"
                     autocomplete="username" required/>
            </div>
            <span class="form-error" id="err-id"></span>
          </div>

          <div class="form-group" id="fg-pw">
            <label class="form-label" for="password">비밀번호</label>
            <div class="input-wrap">
              <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input class="form-input" id="password" name="password" type="password"
                     placeholder="비밀번호 입력"
                     autocomplete="current-password" required/>
              <button type="button" class="pw-toggle" data-target="password" title="비밀번호 보기">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="err-pw"></span>
          </div>

          <button type="submit" class="btn-auth" id="btn-login">
            <span class="btn-auth-text">로그인</span>
            <span class="btn-auth-loader" style="display:none">
              <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
            </span>
          </button>
        </form>

        <div class="auth-footer-links">
          <span>계정이 없으신가요?</span>
          <a href="/signup" class="auth-link">회원가입</a>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="{{ url_for('static', path='js/main.js') }}"></script>
<script src="{{ url_for('static', path='js/main.append.js') }}"></script>
<script>
  // 로그인 전용 스크립트
  document.addEventListener('DOMContentLoaded', () => {
    initTrafficLights();
    initPasswordToggle();
    initLoginValidation();
  });
</script>
</body>
</html>
