services:
  app:
    image: peterhm/mbd-page:latest
    container_name: mbd_page_app
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./data/logs:/app/data/logs
      - ./data/uploads:/app/data/uploads

  db:
    image: postgres:16
    container_name: mbd_page_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
